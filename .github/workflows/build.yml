name: Build

on:
  push:
    branches:
      - master


jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Requires repo/org secrets SONAR_TOKEN and SONAR_HOST_URL; otherwise the scanner
      # fails with "URI with undefined scheme" when SONAR_HOST_URL is unset.
      - uses: sonarsource/sonarqube-scan-action@v5
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
